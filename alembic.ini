[alembic]
script_location = migrations
prepend_sys_path = .

# The URL is set at runtime in migrations/env.py from settings.INBOX_DATABASE_URL
# (which prefers DATABASE_PRIVATE_URL on Railway). This placeholder keeps
# `alembic --autogenerate` etc. from complaining when running outside the app.
sqlalchemy.url = postgresql+psycopg:///placeholder

# Set to "true" to enable Alembic's "include schemas" feature.
# Single-schema deploy on Railway: false is fine.
include_schemas = false


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
