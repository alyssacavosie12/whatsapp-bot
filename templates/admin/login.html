{% extends "admin/base.html" %}

{% block title %}Tulum Botox Admin Login{% endblock %}

{% block body %}
  <div style="max-width: 420px; margin: 40px auto; background: #fff; border: 1px solid #e5e0d8; border-radius: 16px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,.06);">
    <h1>Tulum Botox Admin</h1>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('admin.admin_login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="next" value="{{ next_path or url_for('admin.admin_messages') }}">

      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button class="primary" type="submit" style="width: 100%; margin-top: 20px;">Log in</button>
    </form>

    <p class="hint">Session expires after inactivity.</p>
  </div>
{% endblock %}
