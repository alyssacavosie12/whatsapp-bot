<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Tulum Botox Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf7f2;
      color: #1f2933;
      margin: 0;
      padding: 24px;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }
    a {
      color: #111827;
    }
    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    a.button,
    button,
    .button {
      display: inline-block;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #111827;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
    }
    .primary {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .muted {
      color: #667085;
      font-size: 14px;
    }
    .error {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 10px 12px;
      border-radius: 10px;
    }
    .hint {
      color: #667085;
      font-size: 14px;
      margin-top: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e0d8;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.05);
    }
    .number {
      font-size: 32px;
      font-weight: 800;
      margin: 8px 0 0;
    }
    .label {
      color: #667085;
      font-size: 14px;
      font-weight: 600;
    }
    .note {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 18px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e5e0d8;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 18px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #ece7df;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      font-size: 13px;
      text-transform: uppercase;
      color: #667085;
    }
    .message {
      background: #fff;
      border: 1px solid #e5e0d8;
      border-radius: 14px;
      padding: 14px;
      margin: 12px 0;
    }
    .meta {
      color: #667085;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .body {
      white-space: pre-wrap;
    }
    form {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
