name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt --cache-dir /tmp/pip-audit-cache

      - name: Static security scan
        run: >
          python -m bandit
          app.py
          ai_responder.py
          content_loader.py
          dedup.py
          faq.py
          rate_limit.py
          settings.py
          text_utils.py

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
