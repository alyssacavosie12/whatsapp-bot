name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── JOB 1: Lint, Type, Security ──────────────────────────────
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app.py settings.py bot/ core/ inbox/ webhook/ scripts/

      - name: Bandit security scan
        run: bandit -r app.py settings.py bot/ core/ inbox/ webhook/ scripts/ -c pyproject.toml

      - name: pip-audit CVE check
        run: pip-audit --strict

  # ─── JOB 2: Tests ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      DATABASE_PRIVATE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      META_APP_SECRET: test_secret_32chars_minimum_length
      WHATSAPP_TOKEN: test_token
      WHATSAPP_PHONE_NUMBER_ID: "123456789"
      ANTHROPIC_API_KEY: test_key
      FLASK_SECRET_KEY: test_flask_secret_key_32chars_min
      INBOX_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      INBOX_PROOF_SECRET: test_proof_secret_32chars_minimum_len

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=bot --cov=core --cov=inbox --cov=webhook --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── JOB 3: Deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway deploy --service tulum-btx-whatsapp-bot --detach

      - name: Wait for deployment health
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting 30s for deployment..."
          sleep 30
          curl --fail --retry 5 --retry-delay 5 \
            https://web-production-6b591.up.railway.app/health || exit 1

      - name: Notify on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deploy failed! Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })
